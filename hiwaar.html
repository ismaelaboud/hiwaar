<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hiwaar 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --pink: #ff6b9d;
    --rose: #ff3d7f;
    --deep: #1a0a12;
    --card: #2a0f1e;
    --gold: #ffd166;
    --mint: #06d6a0;
    --soft: #ffe0ec;
    --text: #fff5f9;
    --muted: #b07090;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 20%, #3d0a2255 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, #1a0a3055 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; padding: 20px; }

  /* Header */
  .header {
    text-align: center;
    padding: 30px 0 20px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    background: linear-gradient(135deg, var(--pink), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }

  /* Profiles */
  .profiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin: 20px 0;
  }

  .profile-card {
    background: var(--card);
    border-radius: 20px;
    padding: 18px;
    text-align: center;
    border: 1px solid #ffffff12;
    transition: transform 0.3s, box-shadow 0.3s;
    position: relative;
    overflow: hidden;
  }
  .profile-card::before {
    content: '';
    position: absolute;
    top: -40px; left: -40px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: var(--pink);
    opacity: 0.07;
    filter: blur(30px);
  }
  .profile-card.active-player {
    border-color: var(--pink);
    box-shadow: 0 0 20px #ff6b9d33;
    transform: translateY(-2px);
  }

  .profile-avatar {
    width: 60px; height: 60px;
    border-radius: 50%;
    margin: 0 auto 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    position: relative;
  }
  .player1 .profile-avatar { background: linear-gradient(135deg, #ff6b9d, #ff3d7f); }
  .player2 .profile-avatar { background: linear-gradient(135deg, #a78bfa, #7c3aed); }

  .profile-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .profile-role { font-size: 0.72rem; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }

  .score-row {
    display: flex;
    justify-content: space-around;
    gap: 8px;
  }
  .score-item { text-align: center; }
  .score-num {
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1;
  }
  .score-num.correct { color: var(--mint); }
  .score-num.wrong { color: #ff6b6b; }
  .score-label { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

  .asking-badge {
    display: inline-block;
    background: var(--pink);
    color: white;
    font-size: 0.65rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .active-player .asking-badge { opacity: 1; }

  /* Player Toggle */
  .toggle-section {
    background: var(--card);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 20px;
    border: 1px solid #ffffff10;
  }
  .toggle-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.8px; }
  .toggle-btns { display: flex; gap: 10px; }
  .toggle-btn {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid #ffffff15;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .toggle-btn.active {
    background: linear-gradient(135deg, var(--rose), var(--pink));
    border-color: transparent;
    color: white;
    font-weight: 600;
    box-shadow: 0 4px 15px #ff3d7f44;
  }

  /* Add Question */
  .add-section {
    background: var(--card);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 20px;
    border: 1px solid #ffffff10;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title span { font-size: 1.2rem; }

  .input-group { margin-bottom: 14px; }
  .input-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.6px; }

  input[type="text"], textarea {
    width: 100%;
    background: #ffffff08;
    border: 1px solid #ffffff15;
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus, textarea:focus {
    border-color: var(--pink);
    box-shadow: 0 0 0 3px #ff6b9d18;
  }
  textarea { resize: none; height: 80px; }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .correct-select {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .correct-opt {
    padding: 7px 14px;
    border-radius: 10px;
    border: 1px solid #ffffff18;
    background: transparent;
    color: var(--muted);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .correct-opt.selected {
    background: var(--mint);
    border-color: var(--mint);
    color: #0a2e22;
    font-weight: 600;
  }

  .post-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--rose), var(--pink));
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 6px;
    letter-spacing: 0.3px;
  }
  .post-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px #ff3d7f44; }
  .post-btn:active { transform: translateY(0); }

  /* Quiz Feed */
  .feed-section { margin-top: 10px; }
  .feed-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .quiz-card {
    background: var(--card);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 16px;
    border: 1px solid #ffffff10;
    animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .quiz-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .quiz-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .quiz-meta-info { flex: 1; }
  .quiz-asker { font-size: 0.85rem; font-weight: 600; }
  .quiz-time { font-size: 0.72rem; color: var(--muted); }
  .quiz-target {
    font-size: 0.72rem;
    background: #ffffff10;
    padding: 3px 10px;
    border-radius: 20px;
    color: var(--muted);
  }

  .quiz-question {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .answer-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }

  .ans-btn {
    padding: 11px 14px;
    border-radius: 12px;
    border: 1px solid #ffffff18;
    background: #ffffff06;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .ans-btn:hover:not(:disabled) {
    border-color: var(--pink);
    background: #ff6b9d15;
    transform: translateY(-1px);
  }
  .ans-btn:disabled { cursor: default; }
  .ans-btn.correct-ans {
    background: #06d6a022;
    border-color: var(--mint);
    color: var(--mint);
    font-weight: 600;
  }
  .ans-btn.wrong-ans {
    background: #ff6b6b18;
    border-color: #ff6b6b;
    color: #ff6b6b;
  }
  .ans-btn.reveal-correct {
    background: #06d6a012;
    border-color: #06d6a044;
    color: #06d6a088;
  }

  .result-banner {
    border-radius: 14px;
    padding: 14px 18px;
    text-align: center;
    font-size: 0.95rem;
    font-weight: 600;
    display: none;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }
  .result-banner.correct-result {
    background: #06d6a022;
    border: 1px solid var(--mint);
    color: var(--mint);
    display: block;
  }
  .result-banner.wrong-result {
    background: #ff6b6b18;
    border: 1px solid #ff6b6b;
    color: #ff9a9a;
    display: block;
  }

  .already-answered {
    text-align: center;
    font-size: 0.82rem;
    color: var(--muted);
    padding: 8px;
    font-style: italic;
  }

  /* Confetti overlay */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
  }

  /* Tease Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: #0009;
    backdrop-filter: blur(6px);
    z-index: 998;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: all; }
  .modal-box {
    background: var(--card);
    border: 1px solid #ffffff15;
    border-radius: 24px;
    padding: 32px;
    text-align: center;
    max-width: 320px;
    width: 90%;
    transform: scale(0.9);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-overlay.active .modal-box { transform: scale(1); }
  .modal-emoji { font-size: 3.5rem; margin-bottom: 12px; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 8px; }
  .modal-msg { color: var(--muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px; }
  .modal-close {
    padding: 11px 28px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--rose), var(--pink));
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.95rem;
  }

  .empty-feed {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.9rem;
    font-style: italic;
  }
  .empty-feed .big { font-size: 2.5rem; margin-bottom: 12px; }

  /* Responsive */
  @media(max-width: 480px) {
    .profiles { grid-template-columns: 1fr 1fr; gap: 10px; }
    .profile-card { padding: 14px 10px; }
    .answer-options { grid-template-columns: 1fr; }
    .options-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<!-- Tease/Celebrate Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-emoji" id="modal-emoji">🎉</div>
    <div class="modal-title" id="modal-title">Correct!</div>
    <div class="modal-msg" id="modal-msg"></div>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<div class="app">
  <div class="header">
    <h1>Hiwaar 💕</h1>
    <p>How many questions can you get right?</p>
  </div>

  <!-- Player Profiles -->
  <div class="profiles">
    <div class="profile-card player1" id="card-p1">
      <div class="profile-avatar">💙</div>
      <div class="profile-name" id="name-p1">Ismael</div>
      <div class="profile-role">Player 1</div>
      <div class="score-row">
        <div class="score-item">
          <div class="score-num correct" id="correct-p1">0</div>
          <div class="score-label">✅ Boooosah</div>
        </div>
        <div class="score-item">
          <div class="score-num wrong" id="wrong-p1">0</div>
          <div class="score-label">❌ Mitoooo</div>
        </div>
      </div>
      <div class="asking-badge">Asking Now</div>
    </div>
    <div class="profile-card player2" id="card-p2">
      <div class="profile-avatar">💗</div>
      <div class="profile-name" id="name-p2">Ahlam</div>
      <div class="profile-role">Player 2</div>
      <div class="score-row">
        <div class="score-item">
          <div class="score-num correct" id="correct-p2">0</div>
          <div class="score-label">✅ Boooosah</div>
        </div>
        <div class="score-item">
          <div class="score-num wrong" id="wrong-p2">0</div>
          <div class="score-label">❌ Mitoooo</div>
        </div>
      </div>
      <div class="asking-badge">Asking Now</div>
    </div>
  </div>

  <!-- Who's Asking -->
  <div class="toggle-section">
    <div class="toggle-label">Who is posting this question?</div>
    <div class="toggle-btns">
      <button class="toggle-btn active" id="btn-p1" onclick="setAsker(1)">💙 <span id="btn-name-p1">Ismael</span></button>
      <button class="toggle-btn" id="btn-p2" onclick="setAsker(2)">💗 <span id="btn-name-p2">Ahlaam</span></button>
    </div>
  </div>

  <!-- Add Question -->
  <div class="add-section">
    <div class="section-title"><span>✍️</span> Post a Question</div>

    <div class="input-group">
      <label class="input-label">Your Question</label>
      <textarea id="q-text" placeholder="e.g. What's my favourite food?"></textarea>
    </div>

    <div class="input-group">
      <label class="input-label">Answer Options (fill at least 2)</label>
      <div class="options-grid">
        <input type="text" id="opt-a" placeholder="Option A"/>
        <input type="text" id="opt-b" placeholder="Option B"/>
        <input type="text" id="opt-c" placeholder="Option C (optional)"/>
        <input type="text" id="opt-d" placeholder="Option D (optional)"/>
      </div>
    </div>

    <div class="input-group">
      <label class="input-label">Which is the correct answer?</label>
      <div class="correct-select" id="correct-select">
        <button class="correct-opt" onclick="selectCorrect(0)">A</button>
        <button class="correct-opt" onclick="selectCorrect(1)">B</button>
        <button class="correct-opt" onclick="selectCorrect(2)">C</button>
        <button class="correct-opt" onclick="selectCorrect(3)">D</button>
      </div>
    </div>

    <button class="post-btn" onclick="postQuestion()">💌 Post Question</button>
  </div>

  <!-- Quiz Feed -->
  <div class="feed-section">
    <div class="feed-title"><span>💬</span> Quiz Feed</div>
    <div id="feed">
      <div class="empty-feed">
        <div class="big">💕</div>
        No questions yet — be the first to post one!
      </div>
    </div>
  </div>
</div>

<script>
// ===== STATE =====
let currentAsker = 1;
let correctAnswer = -1;
let quizzes = [];

// ===== API FUNCTIONS =====
const API_BASE = ''; // Same origin since frontend and backend are served together

async function fetchQuizzes() {
  try {
    const response = await fetch(`${API_BASE}/quizzes`);
    if (!response.ok) throw new Error('Failed to fetch quizzes');
    quizzes = await response.json();
    renderFeed();
  } catch (error) {
    console.error('Error fetching quizzes:', error);
    // Fallback to empty array if API fails
    quizzes = [];
    renderFeed();
  }
}

async function createQuiz(quizData) {
  try {
    const response = await fetch(`${API_BASE}/quizzes`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(quizData)
    });
    
    if (!response.ok) throw new Error('Failed to create quiz');
    
    const newQuiz = await response.json();
    quizzes.unshift(newQuiz);
    renderFeed();
    return newQuiz;
  } catch (error) {
    console.error('Error creating quiz:', error);
    alert('Failed to post question. Please try again.');
    throw error;
  }
}

async function updateQuizAnswer(quizId, chosenIndex) {
  try {
    const response = await fetch(`${API_BASE}/quizzes/${quizId}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ chosen: chosenIndex })
    });
    
    if (!response.ok) throw new Error('Failed to update quiz');
    
    const updatedQuiz = await response.json();
    
    // Update local quiz data
    const quizIndex = quizzes.findIndex(q => q._id.toString() === quizId);
    if (quizIndex !== -1) {
      quizzes[quizIndex] = updatedQuiz;
    }
    
    return updatedQuiz;
  } catch (error) {
    console.error('Error updating quiz answer:', error);
    alert('Failed to submit answer. Please try again.');
    throw error;
  }
}

const CELEBRATE_MSGS = [
  "🎉 MashaAllah MashaAllah Twayyib ya Hayaty!",
  "🥰 Hayaty Booosah zangu!",
  "💯 Absolutely correct! Give me a kiss!",
  "✨ You were paying attention, I love that!",
  "🔥 Nailed it! You know me inside out!",
];
const TEASE_MSGS = [
  "😂 Ulooooo Unkosaaa!",
  "😂 Tumzomeni Tumzomeni Ulooo! Uloooo!",
  "😂 Mitoooo hiyooo mtu Mmoja apigwe mitoooo",
  "😅 Babe... seriously? That's embarrassing lol",
  "🙈 Don't worry, I still love you — even if you failed!",
];

// ===== SETUP NAMES =====
function updateNames() {
  const p1 = document.getElementById('name-p1').textContent;
  const p2 = document.getElementById('name-p2').textContent;
  document.getElementById('btn-name-p1').textContent = p1;
  document.getElementById('btn-name-p2').textContent = p2;
}

// ===== ASKER TOGGLE =====
function setAsker(n) {
  currentAsker = n;
  document.getElementById('btn-p1').classList.toggle('active', n === 1);
  document.getElementById('btn-p2').classList.toggle('active', n === 2);
  document.getElementById('card-p1').classList.toggle('active-player', n === 1);
  document.getElementById('card-p2').classList.toggle('active-player', n === 2);
}
setAsker(1);

// ===== SELECT CORRECT =====
function selectCorrect(idx) {
  correctAnswer = idx;
  document.querySelectorAll('.correct-opt').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
  });
}

// ===== POST QUESTION =====
async function postQuestion() {
  const qText = document.getElementById('q-text').value.trim();
  const opts = [
    document.getElementById('opt-a').value.trim(),
    document.getElementById('opt-b').value.trim(),
    document.getElementById('opt-c').value.trim(),
    document.getElementById('opt-d').value.trim(),
  ].filter(o => o !== '');

  if (!qText) { alert('Please type a question!'); return; }
  if (opts.length < 2) { alert('Add at least 2 answer options!'); return; }
  if (correctAnswer < 0 || correctAnswer >= opts.length) { alert('Select the correct answer!'); return; }

  const quizData = {
    asker: currentAsker,
    askerName: document.getElementById(`name-p${currentAsker}`).textContent,
    targetName: document.getElementById(`name-p${currentAsker === 1 ? 2 : 1}`).textContent,
    targetPlayer: currentAsker === 1 ? 2 : 1,
    question: qText,
    options: opts,
    correct: correctAnswer,
    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
  };

  try {
    await createQuiz(quizData);
    clearForm();
  } catch (error) {
    // Error handling is done in createQuiz function
    console.error('Failed to post question:', error);
  }
}

function clearForm() {
  document.getElementById('q-text').value = '';
  document.getElementById('opt-a').value = '';
  document.getElementById('opt-b').value = '';
  document.getElementById('opt-c').value = '';
  document.getElementById('opt-d').value = '';
  correctAnswer = -1;
  document.querySelectorAll('.correct-opt').forEach(b => b.classList.remove('selected'));
}

// ===== RENDER FEED =====
function renderFeed() {
  const feed = document.getElementById('feed');
  if (quizzes.length === 0) {
    feed.innerHTML = `<div class="empty-feed"><div class="big">💕</div>No questions yet — be the first to post one!</div>`;
    return;
  }

  feed.innerHTML = quizzes.map(q => {
    const isP1 = q.asker === 1;
    const avatarStyle = isP1 ? 'background:linear-gradient(135deg,#ff6b9d,#ff3d7f)' : 'background:linear-gradient(135deg,#a78bfa,#7c3aed)';
    const emoji = isP1 ? '💙' : '💗';

    const optionsHtml = q.options.map((opt, i) => {
      let cls = 'ans-btn';
      if (q.answered) {
        if (i === q.correct) cls += ' correct-ans reveal-correct';
        if (i === q.chosen && i !== q.correct) cls += ' wrong-ans';
        if (i === q.correct && q.answeredCorrect) cls = 'ans-btn correct-ans';
      }
      return `<button class="${cls}" onclick="answer('${q._id}', ${i})" ${q.answered ? 'disabled' : ''}>${opt}</button>`;
    }).join('');

    let resultHtml = '';
    if (q.answered) {
      if (q.answeredCorrect) {
        resultHtml = `<div class="result-banner correct-result">🎉 Correct! Well done, ${q.targetName}!</div>`;
      } else {
        resultHtml = `<div class="result-banner wrong-result">😂 Wrong! The correct answer was: ${q.options[q.correct]}</div>`;
      }
    }

    const answeredTag = q.answered ? '' : `<span class="quiz-target">For ${q.targetName}</span>`;

    return `
      <div class="quiz-card" id="qcard-${q._id}">
        <div class="quiz-meta">
          <div class="quiz-avatar" style="${avatarStyle}">${emoji}</div>
          <div class="quiz-meta-info">
            <div class="quiz-asker">${q.askerName} asks:</div>
            <div class="quiz-time">${q.time}</div>
          </div>
          ${answeredTag}
        </div>
        <div class="quiz-question">${q.question}</div>
        <div class="answer-options">${optionsHtml}</div>
        ${resultHtml}
        ${q.answered ? `<div class="already-answered">Answered by ${q.targetName}</div>` : ''}
      </div>`;
  }).join('');
}

// ===== ANSWER =====
async function answer(id, chosenIdx) {
  const quiz = quizzes.find(q => q._id.toString() === id);
  if (!quiz || quiz.answered) return;

  try {
    const updatedQuiz = await updateQuizAnswer(id, chosenIdx);
    
    // Update scores
    const target = updatedQuiz.targetPlayer;
    console.log('Updating scores for player:', target);
    console.log('Answered correct:', updatedQuiz.answeredCorrect);
    
    if (updatedQuiz.answeredCorrect) {
      const el = document.getElementById(`correct-p${target}`);
      console.log('Correct score element found:', el);
      if (el) {
        const currentScore = parseInt(el.textContent);
        el.textContent = currentScore + 1;
        console.log('Updated correct score to:', currentScore + 1);
      }
      showModal(true, updatedQuiz.targetName);
    } else {
      const el = document.getElementById(`wrong-p${target}`);
      console.log('Wrong score element found:', el);
      if (el) {
        const currentScore = parseInt(el.textContent);
        el.textContent = currentScore + 1;
        console.log('Updated wrong score to:', currentScore + 1);
      }
      showModal(false, updatedQuiz.targetName);
    }

    renderFeed();
  } catch (error) {
    console.error('Failed to submit answer:', error);
  }
}

// ===== MODAL =====
function showModal(isCorrect, name) {
  const msgs = isCorrect ? CELEBRATE_MSGS : TEASE_MSGS;
  const msg = msgs[Math.floor(Math.random() * msgs.length)];

  document.getElementById('modal-emoji').textContent = isCorrect ? '🎉' : '😂';
  document.getElementById('modal-title').textContent = isCorrect ? `${name} Twayyiiiiiiib umpata!` : `${name} unkosaaa!`;
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal').classList.add('active');

  if (isCorrect) launchConfetti();
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

// ===== CONFETTI =====
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const pieces = Array.from({ length: 120 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    w: Math.random() * 10 + 5,
    h: Math.random() * 6 + 3,
    color: ['#ff6b9d','#ffd166','#06d6a0','#a78bfa','#ff3d7f','#fff'][Math.floor(Math.random()*6)],
    speed: Math.random() * 4 + 2,
    angle: Math.random() * 360,
    spin: (Math.random() - 0.5) * 6,
    drift: (Math.random() - 0.5) * 2,
  }));

  let frame;
  let elapsed = 0;

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let done = true;
    pieces.forEach(p => {
      p.y += p.speed;
      p.x += p.drift;
      p.angle += p.spin;
      if (p.y < canvas.height + 20) done = false;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, 1 - elapsed / 180);
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    elapsed++;
    if (!done && elapsed < 180) frame = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  cancelAnimationFrame(frame);
  draw();
}

document.addEventListener('DOMContentLoaded', () => {
  fetchQuizzes();
});
